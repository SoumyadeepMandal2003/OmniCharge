name: Deploy to Azure VM

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # allows manual trigger from GitHub UI

jobs:
  deploy:
    name: SSH Deploy to Azure VM
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Azure VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AZURE_VM_IP }}
          username: ${{ secrets.AZURE_VM_USER }}
          key: ${{ secrets.AZURE_SSH_PRIVATE_KEY }}
          script: |
            cd ~/OmniCharge
            git pull origin main

            # Build and start all services
            docker compose -f docker-compose.prod.yml build --parallel
            docker compose -f docker-compose.prod.yml up -d --force-recreate

            # Wait for infrastructure + config-server + eureka to be ready
            echo "Waiting for core services to start..."
            sleep 60

            # Restart config-server so it picks up any new config YMLs
            echo "Restarting config-server to reload configs..."
            docker compose -f docker-compose.prod.yml restart config-server
            sleep 20

            # Restart api-gateway so it re-fetches routes from config-server
            echo "Restarting api-gateway to reload routes..."
            docker compose -f docker-compose.prod.yml restart api-gateway
            sleep 20

            echo "Deployment complete!"
            docker compose -f docker-compose.prod.yml ps
