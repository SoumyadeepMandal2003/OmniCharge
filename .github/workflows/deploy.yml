name: Deploy to Azure VM

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # allows manual trigger from GitHub UI

jobs:
  deploy:
    name: SSH Deploy to Azure VM
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Azure VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AZURE_VM_IP }}
          username: ${{ secrets.AZURE_VM_USER }}
          key: ${{ secrets.AZURE_SSH_PRIVATE_KEY }}
          script: |
            cd ~/OmniCharge
            git pull origin main

            # Build and start all services
            docker compose -f docker-compose.prod.yml build --parallel
            docker compose -f docker-compose.prod.yml up -d --force-recreate

            # Wait for config-server to be fully ready before gateway loads routes
            echo "⏳ Waiting for services to register in Eureka..."
            sleep 45

            # Force restart api-gateway so it re-fetches routes from config-server
            echo "🔄 Restarting api-gateway to reload routes..."
            docker compose -f docker-compose.prod.yml restart api-gateway

            # Wait for gateway to come back up
            sleep 20

            echo "✅ Deployment complete!"
            docker compose -f docker-compose.prod.yml ps
