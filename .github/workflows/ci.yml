name: OmniCharge CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build - ${{ matrix.service }}
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service:
          - auth-service
          - user-service
          - recharge-service
          - payment-service
          - operator-service
          - notification-service
          - api-gateway
          - config-server
          - service-discovery
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build ${{ matrix.service }} (skip tests)
        run: mvn clean package -DskipTests -f ${{ matrix.service }}/pom.xml

  verify-docker:
    name: Verify Docker Config
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify docker-compose configuration
        run: docker compose -f docker-compose.prod.yml config --quiet
