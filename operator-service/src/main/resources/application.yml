spring:
  application:
    name: operator-service
  config:
    import: "configserver:${CONFIG_SERVER_URL:http://localhost:8888}"
  cloud:
    config:
      discovery:
        enabled: false
      fail-fast: false
      retry:
        initial-interval: 3000
        max-interval: 10000
        max-attempts: 20
        multiplier: 1.5

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka}
