spring:
  application:
    name: api-gateway
  config:
    # Mandatory — gateway MUST get config from config-server before starting
    # fail-fast + retry ensures it keeps trying until config-server is ready
    import: "configserver:${CONFIG_SERVER_URL:http://localhost:8888}"
  cloud:
    config:
      # Use direct URL (not Eureka discovery) to avoid Eureka registration race condition
      discovery:
        enabled: false
      fail-fast: true
      retry:
        initial-interval: 3000    # wait 3s before first retry
        max-interval: 10000       # max 10s between retries
        max-attempts: 20          # retry up to 20 times (~3 minutes total)
        multiplier: 1.5           # exponential backoff

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka}
