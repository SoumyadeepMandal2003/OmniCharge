spring:
  application:
    name: api-gateway
  config:
    import: "optional:configserver:${CONFIG_SERVER_URL:http://localhost:8888}"
  cloud:
    config:
      discovery:
        enabled: true
        service-id: config-server
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/auth/**

        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/users/**, /api/admin/users/**
          filters:
            - JwtAuthenticationFilter

        - id: recharge-service
          uri: lb://recharge-service
          predicates:
            - Path=/api/recharges/**
          filters:
            - JwtAuthenticationFilter

        - id: payment-service
          uri: lb://payment-service
          predicates:
            - Path=/api/payments/**
          filters:
            - JwtAuthenticationFilter

        - id: operator-service
          uri: lb://operator-service
          predicates:
            - Path=/api/operators/**, /api/plans/**, /api/admin/operators/**, /api/admin/plans/**
          filters:
            - JwtAuthenticationFilter

        - id: user-service-docs
          uri: lb://user-service
          predicates:
            - Path=/user-service/v3/api-docs
          filters:
            - RewritePath=/user-service/(?<segment>.*), /$\{segment}

        - id: recharge-service-docs
          uri: lb://recharge-service
          predicates:
            - Path=/recharge-service/v3/api-docs
          filters:
            - RewritePath=/recharge-service/(?<segment>.*), /$\{segment}

        - id: payment-service-docs
          uri: lb://payment-service
          predicates:
            - Path=/payment-service/v3/api-docs
          filters:
            - RewritePath=/payment-service/(?<segment>.*), /$\{segment}

        - id: operator-service-docs
          uri: lb://operator-service
          predicates:
            - Path=/operator-service/v3/api-docs
          filters:
            - RewritePath=/operator-service/(?<segment>.*), /$\{segment}

        - id: auth-service-docs
          uri: lb://auth-service
          predicates:
            - Path=/auth-service/v3/api-docs
          filters:
            - RewritePath=/auth-service/(?<segment>.*), /$\{segment}

      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - PATCH
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka}
  instance:
    prefer-ip-address: true

jwt:
  secret: ${JWT_SECRET:OmniChargeSecretKey2024SuperSecureBase64EncodedString==}

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway,metrics
  endpoint:
    gateway:
      enabled: true

logging:
  level:
    org.springframework.cloud.gateway: INFO
    com.omnicharge: DEBUG
